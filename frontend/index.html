<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 2rem auto; padding: 0 1rem; }
    h1 { margin-bottom: 0.25rem; }
    .subtitle { color: #666; font-size: 0.85rem; margin-top: 0; }
    form { display: flex; gap: 0.5rem; flex-wrap: wrap; margin: 1rem 0; }
    input { flex: 1; padding: 0.4rem; border: 1px solid #ccc; border-radius: 4px; }
    button { padding: 0.4rem 0.8rem; cursor: pointer; }
    ul { list-style: none; padding: 0; margin: 0; }
    li { padding: 0.5rem 0.4rem; border-bottom: 1px solid #eee; }
    li.row { display: flex; align-items: center; gap: 0.5rem; }
    li span { cursor: text; flex: 1; }
    li span:hover { background: #f0f4ff; border-radius: 3px; }
a { color: #1a73e8; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .error { color: red; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
