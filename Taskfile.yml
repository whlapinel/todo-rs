version: "3"

tasks:
  codegen:
    desc: Generate the Rust server SDK from the Smithy model
    cmds:
      - ./gradlew :model:assemble
    sources:
      - model/src/main/smithy/**/*.smithy
      - model/smithy-build.json
      - model/build.gradle.kts
    generates:
      - todo-server-sdk/src/**/*.rs
      - todo-client/src/**/*.rs
      - todo-typescript-client/

  client:
    desc: Build the generated TypeScript client package
    dir: todo-typescript-client
    cmds:
      - npm install
      - npm run build
    sources:
      - src/**/*.ts
    generates:
      - dist-cjs/**/*
      - dist-es/**/*
      - dist-types/**/*

  frontend:
    desc: Build the frontend (outputs to frontend/dist/)
    dir: frontend
    deps: [client]
    cmds:
      - npm install
      - npm run build
    sources:
      - src/**/*.ts
      - index.html
    generates:
      - dist/**/*

  build:
    desc: Build everything (codegen + frontend + server)
    deps: [codegen, frontend]
    cmds:
      - cargo build

  run:
    desc: Build and run the server
    deps: [codegen, frontend]
    cmds:
      - cargo run

  check:
    desc: Type-check without producing a binary
    deps: [codegen]
    cmds:
      - cargo check

  clean:
    desc: Remove all build artifacts
    cmds:
      - cargo clean
      - rm -rf todo-server-sdk
      - rm -rf model/build
      - rm -rf build
